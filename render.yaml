# This Blueprint enables "1-click deploy" after connecting your Repo to Render
services:
  - type: web
    name: conflictiq-api
    env: docker
    dockerfilePath: ./Dockerfile.render
    plan: free
    # Use the simpler /health path which always responds even if DB is unavailable
    healthCheckPath: /health

    # Render overrides the standard Docker PORT, defaulting effectively to 10000
    envVars:
      - key: DATABASE_URL
        # We explicitly omit passing this in source control.
        # Add your Neon.tech DB URL securely via the Render Settings Dashboard UI.
        sync: false

      - key: UPSTASH_REDIS_REST_URL
        sync: false

      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false

      - key: PYTHONPATH
        value: /app
